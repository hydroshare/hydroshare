{% extends "base.html" %} {% block meta_title %}Discover{% endblock %}
{% block all_content %}

<div class="main-container full-width" style="height: 100%; padding-bottom: 0;">
  <iframe
    id="discovery-app-frame"
    src="{{ iframeSrc }}"
    style="width: 100%; height: 100%; border: 0"
  ></iframe>
</div>
<script type="text/javascript">
  const iframe = document.getElementById("discovery-app-frame");
  const targetOrigin = "{{ targetOrigin }}"; // For security

  // Send the route params to the iframe when the HydroShare page loads
  iframe.addEventListener("load", () => {
      iframe.contentWindow.postMessage({parentSearch: window.location.search}, targetOrigin);

      window.addEventListener("message", receiveMessage, false);
  });

  function receiveMessage(event) {
    if (event.origin !== targetOrigin) {
      return;
    }

    // When the iframe updates the route params, update the HydroShare params
    const url = new URL(window.location.href);
    url.search = ''
    Object.entries(event.data.childParams).forEach(([key, value], index) => {
        if (value != undefined) {
          if (typeof value === 'object' && value.length) {
            value.forEach((val) => {
              url.searchParams.append(key, val)
            })
          }
          else {
            url.searchParams.set(key, value)
          }
        }
    })

    window.history.replaceState({}, '', url);
  }
</script>
{% endblock %}
