<div class="discovery-toolbar panel panel-default">
  <div class="panel-body">
    <input type="hidden" name="order" value="{{ selected_order|default:'' }}">
    <div class="row">
      <div class="col-sm-8">
        <label class="sr-only" for="id_term">Search</label>
        <div class="input-group input-group-lg discovery-main-search discovery-typeahead-wrap" x-data="discoveryTypeahead()" @click.outside="closeMenu()">
          <input type="hidden" name="term" x-bind:value="query">
          <span class="input-group-addon"><span class="glyphicon glyphicon-search"></span></span>
          <input
            type="search"
            id="id_term"
            class="form-control discovery-typeahead-input"
            value="{{ form.term.value|default:'' }}"
            placeholder="Search all Public and Discoverable Resources"
            autocomplete="off"
            data-typeahead-field="term"
            data-typeahead-url="{{ typeahead_url }}"
            data-apply-on-select="true"
            x-ref="input"
            x-model="query"
            x-bind:aria-expanded="isOpen ? 'true' : 'false'"
            @input.debounce.250ms="fetchSuggestions()"
            @keydown.arrow-down.prevent="moveDown()"
            @keydown.arrow-up.prevent="moveUp()"
            @keydown.escape.prevent="closeMenu()"
            @keydown.enter="handleEnter($event)"
            @focus="maybeFetchSuggestions()"
            @blur="handleBlur()"
            hx-get="{{ results_url }}"
            hx-trigger="typeahead-select, keyup[key=='Enter'], term-cleared"
            hx-target="#results-region"
            hx-include="#discovery-form"
            hx-push-url="true"
          >
          <button
            type="button"
            class="discovery-main-search-clear"
            x-cloak
            x-bind:style="query.trim().length ? '' : 'display: none;'"
            @click.prevent="clearTerm()"
            aria-label="Clear search term"
            title="Clear search term"
          >
            <span aria-hidden="true">&times;</span>
          </button>
          <ul class="discovery-typeahead-menu" x-cloak x-show="isOpen && suggestions.length" :class="{ 'is-open': isOpen && suggestions.length }">
            <template x-for="(suggestion, index) in suggestions" :key="suggestion">
              <li class="discovery-typeahead-item" :class="{ 'is-active': index === activeIndex }" @mousedown.prevent="selectSuggestion(suggestion)" x-text="suggestion"></li>
            </template>
          </ul>
        </div>
      </div>
      <div class="col-sm-2">
        <button type="submit" class="btn btn-primary btn-lg btn-block discovery-search-btn">Search</button>
      </div>
      <div class="col-sm-2 discovery-sort-wrap">
        <label class="discovery-sort-label">Sort results by</label>
        <input type="hidden" name="sort" id="id_sort" value="{{ selected_sort }}">
        <div class="dropdown discovery-sort-dropdown">
          <button class="btn btn-default btn-lg btn-block dropdown-toggle discovery-sort-button" type="button" id="discovery-sort-dropdown" data-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
            <span class="discovery-sort-button-label" id="discovery-sort-button-label">{{ selected_sort_label }}</span>
            <span class="caret"></span>
          </button>
          <ul class="dropdown-menu dropdown-menu-right discovery-sort-menu" aria-labelledby="discovery-sort-dropdown">
            {% for option in sort_options %}
              <li{% if option.active %} class="active"{% endif %} data-sort-value="{{ option.value }}" data-sort-label="{{ option.label }}">
                <a
                  href="{{ search_url }}?{{ option.querystring }}"
                  hx-get="{{ results_url }}?{{ option.querystring }}"
                  hx-target="#results-region"
                  hx-push-url="true"
                >{{ option.label }}</a>
              </li>
            {% endfor %}
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
