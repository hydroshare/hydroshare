{% if results.has_more and load_more_querystring %}
  <button
    type="button"
    class="btn btn-primary btn-block discovery-load-more-btn"
    hx-get="{{ more_url }}?{{ load_more_querystring }}"
    hx-target="#results-list"
    hx-swap="beforeend"
    hx-indicator="#results-loading"
  >
    Load more
  </button>
{% else %}
  <p class="discovery-results-end">End of results.</p>
{% endif %}
