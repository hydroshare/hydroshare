<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Hydrofabric Subsetter</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
    <script src="https://unpkg.com/pmtiles@4.0.1/dist/pmtiles.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.11.0/sql-wasm.js"></script>
  </head>
  <body>
    <div id="map-container">
      <div id="map"></div>
      <div id="map-right"></div>
      <div id="label-left" class="map-label">Catchments</div>
      <div id="label-right" class="map-label">Reference</div>
    </div>
    <div id="sidebar">
      <header>
        <h1>&#9651; HYDROFABRIC SUBSETTER</h1>
        <p>Click a catchment on the map or enter an ID. Upstream network is auto-selected, then download a subset GeoPackage.</p>
      </header>
      <div id="controls">
        <div class="field">
          <label>Catchment ID</label>
          <input id="input-catid" type="text" placeholder="e.g. cat-486931" spellcheck="false"/>
        </div>
        <label class="checkbox-field">
          <input type="checkbox" id="chk-include-outlet" checked/>
          <span>Include outlet nexus</span>
        </label>
        <div class="btn-row">
          <button id="btn-subset" disabled>Subset &amp; Download</button>
          <button id="btn-clear">Clear</button>
        </div>
      </div>
      <div id="selection-info"></div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="log-container"><div id="log"></div></div>
    </div>

    <div id="legend">
      <h2>Reference Layers</h2>
      <div class="legend-item">
        <input type="checkbox" id="toggle-split"/>
        <label for="toggle-split">Split View</label>
      </div>
      <hr style="border:none;border-top:1px solid var(--border);margin:8px 0"/>
      <div class="legend-item">
        <input type="checkbox" id="toggle-flowpaths"/>
        <label for="toggle-flowpaths">Flowpaths</label>
        <input type="color" id="color-flowpaths" value="#FF0000"/>
      </div>
      <div class="legend-item">
        <input type="checkbox" id="toggle-divides"/>
        <label for="toggle-divides">Divides</label>
        <input type="color" id="color-divides" value="#11FF00"/>
      </div>
    </div>
  </body>

  <script type="module">
    import { useMap } from "{% static 'js/src/composables/useMap.js' %}";
    import { useNetwork } from "{% static 'js/src/composables/useNetwork.js' %}";
    import { useParquet } from "{% static 'js/src/composables/useParquet.js' %}";
    import { useSubset } from "{% static 'js/src/updateMapFilters/useSubset.js' %}";
    import { state, log } from "{% static 'js/src/config.js' %}";

    const { initHyparquet } = useParquet();
    const { loadNetworkGraph, getUpstreamIds } = useNetwork();
    const { subsetAndDownload } = useSubset();
    const { initMap, updateMapFilters, toggleSplitView } = useMap();


    // ============================================================
    // SELECTION
    // ============================================================
    async function selectOutlet(catId) {
      if (!catId.startsWith('cat-')) catId = 'cat-' + catId.replace(/^(cat-?)/, '');
      state.outletCatId = catId;
      document.getElementById('input-catid').value = catId;

      const numeric = parseInt(catId.split('-')[1]);
      const includeOutlet = document.getElementById('chk-include-outlet').checked;

      log(`\nSelected: ${catId}`, 'step');
      const t0 = performance.now();
      state.upstreamNumericIds = getUpstreamIds(numeric, includeOutlet);
      state.upstreamCatIds = Array.from(state.upstreamNumericIds).map(n => `cat-${n}`);
      log(`  ${state.upstreamNumericIds.size} upstream catchments (${(performance.now()-t0).toFixed(0)}ms)`, 'success');

      const info = document.getElementById('selection-info');
      info.style.display = 'block';
      info.innerHTML = `Outlet: <span class="outlet">${catId}</span><br>Upstream: <span class="count">${state.upstreamNumericIds.size}</span> catchments`;

      document.getElementById('btn-subset').disabled = false;
      updateMapFilters();
    }

    // ============================================================
    // EVENT HANDLERS
    // ============================================================
    document.getElementById('input-catid').addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        const val = e.target.value.trim();
        if (val) selectOutlet(val);
      }
    });
    document.getElementById('btn-subset').addEventListener('click', subsetAndDownload);
    document.getElementById('chk-include-outlet').addEventListener('change', () => {
      if (state.outletCatId) selectOutlet(state.outletCatId);
    });

    document.getElementById('toggle-split').addEventListener('change', (e) => {
      toggleSplitView(e.target.checked);
    });

    document.getElementById('toggle-flowpaths').addEventListener('change', (e) => {
      const vis = e.target.checked ? 'visible' : 'none';
      const target = state.splitActive && state.mapRight ? state.mapRight : state.map;
      if (target && target.getLayer('ref_flowpaths')) {
        target.setLayoutProperty('ref_flowpaths', 'visibility', vis);
      }
    });
    document.getElementById('toggle-divides').addEventListener('change', (e) => {
      const vis = e.target.checked ? 'visible' : 'none';
      const target = state.splitActive && state.mapRight ? state.mapRight : state.map;
      if (target && target.getLayer('ref_divides')) {
        target.setLayoutProperty('ref_divides', 'visibility', vis);
      }
    });
    document.getElementById('color-flowpaths').addEventListener('input', (e) => {
      const target = state.splitActive && state.mapRight ? state.mapRight : state.map;
      if (target && target.getLayer('ref_flowpaths')) {
        target.setPaintProperty('ref_flowpaths', 'line-color', e.target.value);
      }
    });
    document.getElementById('color-divides').addEventListener('input', (e) => {
      const target = state.splitActive && state.mapRight ? state.mapRight : state.map;
      if (target && target.getLayer('ref_divides')) {
        target.setPaintProperty('ref_divides', 'line-color', e.target.value);
      }
    });
    document.getElementById('btn-clear').addEventListener('click', () => {
      state.outletCatId = null;
      state.upstreamCatIds = [];
      state.upstreamNumericIds.clear();
      document.getElementById('input-catid').value = '';
      document.getElementById('selection-info').style.display = 'none';
      document.getElementById('btn-subset').disabled = true;
      updateMapFilters();
      logEl.innerHTML = '';
      setProgress(0);
    });

    // ============================================================
    // BOOT
    // ============================================================
    (async () => {
      initMap();
      try {
        await loadNetworkGraph();
        log('Ready. Zoom in and click a catchment, or type an ID.', 'success');
      } catch (err) {
        log(`Init error: ${err.message}`, 'error');
        console.error(err);
      }
    })();
  </script>
<style>
  @import "{% static 'css/style.css' %}";
</style>
</html>
