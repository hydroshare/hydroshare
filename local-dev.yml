services:
  minio:
    # this is the last release before the admin features were removed from the console
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    platform: linux/amd64
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data_vol:/data
    environment:
      MINIO_ROOT_USER: cuahsi
      MINIO_ROOT_PASSWORD: devpassword
      MINIO_BROWSER_REDIRECT: "false"
      MINIO_SCANNER_SPEED: "fastest"
    command: server --console-address ":9001" /data
    depends_on:
      - hs-s3-auth
  postgis:
    image: postgis/postgis:15-3.3
    platform: linux/amd64
    environment:
      POSTGRES_PASSWORD: 'postgres'
    container_name: postgis
    hostname: postgis
    volumes:
      - "postgis_data_vol:/var/lib/postgresql/data"
    ports:
      - "54322:5432"
    stdin_open: true
    tty: true
  pgbouncer:
    image: edoburu/pgbouncer:latest
    platform: linux/amd64
    container_name: pgbouncer
    environment:
      DB_HOST: postgis
      DB_USER: "postgres"
      DB_PASSWORD: "postgres"
      DB_NAME: "postgres"
      DB_PORT: 5432
      LISTEN_ADDR: "*"
      LISTEN_PORT: 6432
      POOL_MODE: "transaction"
      AUTH_TYPE: "plain"
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 5
      MIN_POOL_SIZE: 2
    ports:
      - "6432:6432"
    depends_on:
      - postgis
  hydroshare:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hydroshare
    hostname: hydroshare
    devices:
      - "/dev/fuse"
    privileged: true
    environment:
      POSTGIS_HOST: pgbouncer
      POSTGIS_PORT: 6432
      POSTGIS_PASSWORD: postgres
      POSTGIS_DB: postgres
      POSTGIS_USER: postgres
      PGPASSWORD: postgres
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
      TMP: /tmp
      POSTGIS_PORT_5432_TCP_ADDR: pgbouncer
      POSTGIS_DISABLE_SERVER_SIDE_CURSORS: "True"
      HS_PATH: ${PWD}
      PYTHONPATH: /hydroshare
      DJANGO_SETTINGS_MODULE: hydroshare.settings
      VUE_APP_BUCKET_URL_PUBLIC_PATH: "/static/static"
      DATACITE_USERNAME: ${DATACITE_USERNAME}
      DATACITE_PASSWORD: ${DATACITE_PASSWORD}
      ATLAS_CONNECTION_URL: "mongodb://user:pass@mongodb:27017/"
      MC_HOST_hydroshare: "http://cuahsi:devpassword@minio:9000"
    volumes:
      # hydroshare repository
      - ".:/hydroshare"
      # shared location for gunicorn.sock between containers
      - "temp_vol:/tmp"
      # temp directory shared with celery workers
      - "share_vol:/shared_tmp"
    ports:
      - "1338:2022"
      - "8000:8000"
    links:
      - postgis:postgis
      - redis:redis
      - minio:minio
    depends_on:
      - postgis
      - pgbouncer
      - redis
      - minio
    stdin_open: true
    tty: true
    command: python manage.py runserver 0.0.0.0:8000
  defaultworker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: defaultworker
    platform: linux/amd64
    hostname: defaultworker
    environment:
      POSTGIS_HOST: pgbouncer
      POSTGIS_PORT: 6432
      POSTGIS_PASSWORD: postgres
      POSTGIS_DB: postgres
      POSTGIS_USER: postgres
      PGPASSWORD: postgres
      C_FORCE_ROOT: 1
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      POSTGIS_PORT_5432_TCP_ADDR: pgbouncer
      POSTGIS_DISABLE_SERVER_SIDE_CURSORS: "True"
      HS_PATH: ${PWD}
      PYTHONPATH: /hydroshare
      DJANGO_SETTINGS_MODULE: hydroshare.settings
      COLUMNS: 80
    ports:
      - "5555:5555"
    volumes:
      - ".:/hydroshare"
    links:
      - pgbouncer:pgbouncer
    depends_on:
      - hydroshare
      - pgbouncer
      - redis
    stdin_open: true
    tty: true
    command: /bin/bash init-defaultworker
  hs_event_s3:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      POSTGIS_HOST: pgbouncer
      POSTGIS_PORT: 6432
      POSTGIS_PASSWORD: postgres
      POSTGIS_DB: postgres
      POSTGIS_USER: postgres
      PGPASSWORD: postgres
      C_FORCE_ROOT: 1
      POSTGIS_PORT_5432_TCP_ADDR: pgbouncer
      POSTGIS_DISABLE_SERVER_SIDE_CURSORS: "True"
      HS_PATH: ${PWD}
      PYTHONPATH: /hydroshare
      DJANGO_SETTINGS_MODULE: hydroshare.settings
      COLUMNS: 80
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    volumes:
      - ".:/hydroshare"
    links:
      - pgbouncer:pgbouncer
      - redis:redis
    depends_on:
      - hydroshare
      - pgbouncer
      - redis
    stdin_open: true
    tty: true
    command: celery -A hs_event_s3.celery_app worker -Q s3_events --loglevel=info
  discovery_collection_worker:
    build:
      context: .
      dockerfile: Dockerfile
    platform: linux/amd64
    environment:
      POSTGIS_HOST: pgbouncer
      POSTGIS_PORT: 6432
      POSTGIS_PASSWORD: postgres
      POSTGIS_DB: postgres
      POSTGIS_USER: postgres
      PGPASSWORD: postgres
      C_FORCE_ROOT: 1
      POSTGIS_PORT_5432_TCP_ADDR: pgbouncer
      POSTGIS_DISABLE_SERVER_SIDE_CURSORS: "True"
      HS_PATH: ${PWD}
      PYTHONPATH: /hydroshare
      DJANGO_SETTINGS_MODULE: hydroshare.settings
      COLUMNS: 80
      ATLAS_CONNECTION_URL: "mongodb://user:pass@mongodb:27017/"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/0"
    volumes:
      - ".:/hydroshare"
    links:
      - pgbouncer:pgbouncer
      - minio:minio
      - mongodb:mongodb
      - redis:redis
    depends_on:
      - hydroshare
      - pgbouncer
      - redis
      - mongodb
    stdin_open: true
    tty: true
    command: celery -A hs_event_s3.celery_app worker -Q s3_events --loglevel=info
  hs_extract:
    build:
      context: .
      dockerfile: hs_extract/Dockerfile
    platform: linux/amd64
    command: ["celery", "-A", "hs_extract.celery_app", "worker", "-Q", "extract", "--loglevel=info"]
    environment:
      AWS_S3_ENDPOINT_URL: "http://minio:9000"
      AWS_ACCESS_KEY_ID: cuahsi
      AWS_SECRET_ACCESS_KEY: devpassword
      MC_HOST_hydroshare: "http://cuahsi:devpassword@minio:9000"
      CELERY_BROKER_URL: "redis://redis:6379/0"
    volumes:
      - "./hs_extract:/app/hs_extract"
      - "./hs_cloudnative_schemas:/app/hs_extract/hs_cloudnative_schemas"
      - "./hydroshare/settings.py:/app/hydroshare/settings.py:ro"
    links:
      - pgbouncer:pgbouncer
    depends_on:
      - hydroshare
      - pgbouncer
    stdin_open: true
    tty: true
  companion:
  # https://github.com/transloadit/uppy/blob/main/packages/%40uppy/companion/KUBERNETES.md
    image:  docker.io/transloadit/companion:5.5.0
    platform: linux/amd64
    container_name: companion
    hostname: companion
    environment:
      COMPANION_PORT: '3020'
      COMPANION_CLIENT_ORIGINS: 'https://localhost'
      # when testing 3rd party services like google drive, you will access hydroshare at http://host.docker.internal:8000
      # you will need to add a line in your /etc/hosts file to map host.docker.internal to localhost
      COMPANION_UPLOAD_URLS: 'https://localhost/django_s3/tus/*'
      COMPANION_DATADIR: '/mnt/companion-data'
      COMPANION_DOMAIN: 'localhost'
      COMPANION_PATH: '/companion'
      COMPANION_ALLOW_LOCAL_URLS: 'true'
      COMPANION_PROTOCOL: 'https'
      COMPANION_REDIS_URL: 'redis://redis:6379'
      COMPANION_CHUNK_SIZE: '100000000'  # ~72MB
      # COMPANION_PREAUTH_SECRET: 'another secret'
      # For 3rd party services like google drive to work locally, you need to set the following:
      COMPANION_SECRET: 'SECRET'
      # Intentionally added to repo for testing purposes
      COMPANION_GOOGLE_KEY: '737951655407-p3d2b2bl2ln90g5plfj09e98bprk42da.apps.googleusercontent.com'
      COMPANION_GOOGLE_SECRET: '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'
      # https://uppy.io/docs/companion/#enablegooglepickerendpoint-companion_enable_google_picker_endpoint
      COMPANION_ENABLE_GOOGLE_PICKER_ENDPOINT: 'true'
    ports:
      - "3020:3020"
    volumes:
      - "companion_vol:/mnt/companion-data"
    depends_on:
      - redis
  redis:
    image: redis:latest
    platform: linux/amd64
    container_name: redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - "redis_data_vol:/data"
    command: redis-server
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-local-dev.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/config:/etc/ssl
    depends_on:
      - hydroshare
      - companion
      # If running discovery-atlas via docker, wait for discovery-atlas to be up before starting nginx
      # - discovery-atlas HEAD
  hs-s3-auth:
    image: hydroshare/hs-s3-auth:latest
    platform: linux/amd64
    container_name: hs-s3-auth
    build:
      context: ./hs_s3_auth
      dockerfile: Dockerfile
    environment:
      HS_DATABASE_URL: "postgresql://postgres:postgres@postgis:5432/postgres"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      ENABLE_EDIT_ACTIONS: "true"
      S3_BACKEND_ACCESS_KEY: "cuahsi"
      S3_BACKEND_SECRET_KEY: "devpassword"
    ports:
      - 8001:80
    links:
      - postgis:postgis
    restart: on-failure
    depends_on:
      - postgis
  hs-s3-proxy:
    image: hydroshare/hs-s3-proxy:latest
    platform: linux/amd64
    container_name: hs-s3-proxy
    build:
      context: ./hs_s3_proxy
      dockerfile: Dockerfile
    environment:
      AUTH_SERVICE_URL: "http://hs-s3-auth"
      AUTH_SERVICE_TIMEOUT: "5"
      S3_BACKEND_URL: "http://minio:9000"
      S3_BACKEND_ACCESS_KEY: "cuahsi"
      S3_BACKEND_SECRET_KEY: "devpassword"
      S3_BACKEND_REGION: "auto"
      S3_PROXY_TIMEOUT: "300"
    ports:
      - 9002:9000
    links:
      - hs-s3-auth:hs-s3-auth
      - minio:minio
    restart: on-failure
    depends_on:
      - hs-s3-auth
      - minio
  mongodb:
    image: mongodb/mongodb-atlas-local
    container_name: mongodb
    hostname: mongodb
    environment:
      - MONGODB_INITDB_ROOT_USERNAME=user
      - MONGODB_INITDB_ROOT_PASSWORD=pass
      - ATLAS_CONNECTION_URL=mongodb://user:pass@localhost:27017/
    ports:
      - 27017:27017
    volumes:
      - mongodb_data_vol:/data/db
      - mongodb_config_vol:/data/configdb
      - mongodb_mongot_vol:/data/mongot
      - ./hs_discover/search_indexes:/hs_discover/search_indexes:ro
    healthcheck:
      test: ["CMD", "mongosh", "mongodb://localhost:27017/?directConnection=true", "--quiet", "--eval", "rs.isMaster().ismaster || quit(1)"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
  # for local dev, we run discover using pm2 and a vite dev server
  # this allows for better developer experience with features like HMR
  # the discovery-atlas service is run using "make up-discover"
  # discovery-atlas:
  #   build:
  #     context: discovery-atlas/frontend
  #     dockerfile: Dockerfile
  #   container_name: discovery-atlas
  #   hostname: discovery-atlas
  #   platform: linux/amd64
  #   environment:
  #     VITE_APP_NAME: "Discover"
  #     VITE_APP_API_URL: "http://localhost/hsapi/discovery-atlas"
  #     VITE_APP_BASE: "/discover/"
  #     VITE_APP_ORIGIN: "http://localhost"
  #   depends_on:
  #     mongodb:
  #       condition: service_healthy
volumes:
  postgis_data_vol:
  mongodb_data_vol:
  mongodb_config_vol:
  mongodb_mongot_vol:
  temp_vol:
  share_vol:
  minio_data_vol:
  redis_data_vol:
  companion_vol:
